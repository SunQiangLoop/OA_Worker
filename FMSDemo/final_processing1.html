<!DOCTYPE html>
<html lang="zh-CN">
<!--
  文件用途：期末处理主面板 + 总览仪表盘
  关联文件：
    - final_processing.html（自动转账/摊销/预提方案管理）
    - final_processing2.html（结转损益/期末结账向导）
  数据共享：localStorage，key前缀 QM_
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>期末处理 — 财务管理系统</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    background: #f0f2f5;
    color: #1f2937;
    min-height: 100vh;
  }

  /* ── 顶部标题栏 ── */
  .topbar {
    background: #ffffff;
    border-bottom: 1px solid #e5e7eb;
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .topbar-title {
    font-size: 18px;
    font-weight: 700;
    color: #1f2937;
    letter-spacing: 0.5px;
  }

  .topbar-title span {
    color: #3b82f6;
  }

  .period-selector-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .period-selector-wrap label {
    font-size: 13px;
    color: #6b7280;
  }

  .period-selector {
    border: 1px solid #d1d5db;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 13px;
    color: #1f2937;
    background: #f9fafb;
    cursor: pointer;
    outline: none;
  }

  .period-selector:focus {
    border-color: #3b82f6;
    background: #fff;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .period-badge {
    background: #eff6ff;
    color: #1d4ed8;
    border: 1px solid #bfdbfe;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 13px;
    font-weight: 600;
  }

  /* ── 主内容区 ── */
  .main-content {
    padding: 28px 32px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .section-title {
    font-size: 15px;
    font-weight: 600;
    color: #374151;
  }

  .section-sub {
    font-size: 13px;
    color: #9ca3af;
    margin-top: 2px;
  }

  /* ── 功能卡片网格 ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 32px;
  }

  .func-card {
    background: #ffffff;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border: 1.5px solid #f3f4f6;
    transition: all 0.22s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .func-card:hover {
    border-color: #93c5fd;
    box-shadow: 0 6px 24px rgba(59,130,246,0.12);
    transform: translateY(-2px);
  }

  .func-card.done {
    border-color: #a7f3d0;
    background: linear-gradient(135deg, #fff 70%, #f0fdf4 100%);
  }

  .func-card.done:hover {
    border-color: #6ee7b7;
    box-shadow: 0 6px 24px rgba(5,150,105,0.12);
  }

  .card-icon {
    font-size: 36px;
    margin-bottom: 12px;
    display: block;
    line-height: 1;
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .card-name {
    font-size: 16px;
    font-weight: 700;
    color: #111827;
  }

  .status-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .status-ready {
    background: #fffbeb;
    color: #92400e;
    border: 1px solid #fde68a;
  }

  .status-done {
    background: #d1fae5;
    color: #065f46;
    border: 1px solid #a7f3d0;
  }

  .status-pending {
    background: #fee2e2;
    color: #991b1b;
    border: 1px solid #fca5a5;
  }

  .card-desc {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-meta {
    font-size: 12px;
    color: #9ca3af;
  }

  .btn-enter {
    background: #3b82f6;
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 7px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.18s;
    text-decoration: none;
    display: inline-block;
  }

  .btn-enter:hover {
    background: #2563eb;
  }

  .btn-enter.done-btn {
    background: #059669;
  }

  .btn-enter.done-btn:hover {
    background: #047857;
  }

  /* ── 完成装饰 ── */
  .done-mark {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .func-card.done .done-mark {
    opacity: 1;
  }

  /* ── 进度条区域 ── */
  .progress-section {
    background: #ffffff;
    border-radius: 12px;
    padding: 28px 32px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    margin-bottom: 24px;
  }

  .progress-title {
    font-size: 14px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .progress-title::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 16px;
    background: #3b82f6;
    border-radius: 2px;
  }

  /* 横向步骤条 */
  .steps-bar {
    display: flex;
    align-items: center;
    position: relative;
  }

  .step-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    position: relative;
    z-index: 1;
  }

  .step-line {
    position: absolute;
    top: 20px;
    left: calc(50% + 20px);
    right: calc(-50% + 20px);
    height: 3px;
    background: #e5e7eb;
    z-index: 0;
    transition: background 0.4s;
  }

  .step-line.done {
    background: #34d399;
  }

  .step-item:last-child .step-line {
    display: none;
  }

  .step-circle {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #e5e7eb;
    color: #9ca3af;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 10px;
    transition: all 0.3s;
    position: relative;
    z-index: 1;
    border: 3px solid #e5e7eb;
  }

  .step-circle.done {
    background: #d1fae5;
    color: #059669;
    border-color: #34d399;
  }

  .step-circle.current {
    background: #eff6ff;
    color: #3b82f6;
    border-color: #3b82f6;
    box-shadow: 0 0 0 4px rgba(59,130,246,0.12);
  }

  .step-label {
    font-size: 12px;
    font-weight: 600;
    color: #6b7280;
    text-align: center;
    line-height: 1.4;
  }

  .step-item.done .step-label {
    color: #059669;
  }

  .step-item.current .step-label {
    color: #3b82f6;
  }

  .step-status {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 3px;
    text-align: center;
  }

  .step-item.done .step-status {
    color: #34d399;
  }

  /* ── 统计摘要 ── */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .summary-card {
    background: #ffffff;
    border-radius: 10px;
    padding: 18px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    border-left: 4px solid #3b82f6;
  }

  .summary-card.green { border-left-color: #059669; }
  .summary-card.orange { border-left-color: #d97706; }
  .summary-card.red { border-left-color: #dc2626; }

  .summary-label {
    font-size: 12px;
    color: #6b7280;
    margin-bottom: 6px;
  }

  .summary-value {
    font-size: 22px;
    font-weight: 700;
    color: #111827;
  }

  .summary-sub {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 2px;
  }

  /* ── Toast 提示 ── */
  #toast-container {
    position: fixed;
    top: 20px;
    right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .toast {
    background: #1f2937;
    color: #fff;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 14px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    animation: slideIn 0.3s ease;
    max-width: 320px;
  }

  .toast.success { background: #059669; }
  .toast.warning { background: #d97706; }
  .toast.error { background: #dc2626; }

  @keyframes slideIn {
    from { transform: translateX(110%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  @keyframes slideOut {
    from { transform: translateX(0); opacity: 1; }
    to { transform: translateX(110%); opacity: 0; }
  }

  .toast.removing {
    animation: slideOut 0.3s ease forwards;
  }
</style>
</head>
<body>

<!-- Toast 容器 -->
<div id="toast-container"></div>

<!-- 顶部标题栏 -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">财务管理系统 <span>/</span> 期末处理</div>
    <div class="period-selector-wrap">
      <label>会计期间：</label>

<!-- 主内容 -->
<div class="main-content">

  <div class="progress-section">
    <div class="progress-title">本期操作进度</div>
    <div class="steps-bar" id="stepsBar">
      <!-- 由JS动态渲染 -->
    </div>
  </div>

  <!-- 功能卡片区 -->
  <div class="section-header">
    <div>
      <div class="section-title">期末处理功能模块</div>
      <div class="section-sub">按照流程顺序完成各步骤，完成后点击"进入"继续操作</div>
    </div>
  </div>

  <div class="cards-grid" id="cardsGrid">
    <!-- 由JS动态渲染 -->
  </div>

</div>

<script>
// ── 工具函数：localStorage 安全读写 ──
function lsGet(key) {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : null;
  } catch(e) { return null; }
}

function lsSet(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
    return true;
  } catch(e) { return false; }
}

// ── 当前月份字符串 ──
function todayPeriod() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
}

// ── 从 ManualVouchers 收集所有涉及的期间 ──
function collectPeriodsFromVouchers() {
  try {
    const vouchers = JSON.parse(sessionStorage.getItem('ManualVouchers') || '[]');
    const set = new Set();
    vouchers.forEach(v => {
      const p = v.period || (v.date || '').substring(0, 7);
      if (p && /^\d{4}-\d{2}$/.test(p)) set.add(p);
    });
    return set;
  } catch(e) { return new Set(); }
}

            { lineName:'教育附加',       baseCode:'222101', dataDir:'贷方净额', ratio:3,  debitCode:'6403', debitName:'营业税金及附加', creditCode:'222103', creditName:'应交教育费附加', aux:'部门/项目' },

}

// ── 步骤配置 ──
const STEPS = [
  { key: 'autoTransfer', label: '自动转账', icon: '🔄', desc: '自动执行配置的转账方案，生成记账凭证', url: 'final_processing.html?tab=auto', checkFn: () => getStepDone('autoTransfer') },
  { key: 'amort',        label: '凭证摊销', icon: '📉', desc: '按摊销计划生成本期摊销凭证',             url: 'final_processing.html?tab=amort', checkFn: () => getStepDone('amort') },
  { key: 'accrue',       label: '凭证预提', icon: '📋', desc: '执行预提方案，计提本期应预提费用',       url: 'final_processing.html?tab=accrue', checkFn: () => getStepDone('accrue') },
  { key: 'adjust', label: '账务调整', icon: '🔀', desc: '期末往来对冲、科目重分类、坏账准备计提、暂估冲回', url: 'final_processing.html?tab=adjust', checkFn: () => getStepDone('adjust') },
  { key: 'profit',       label: '结转损益', icon: '⚖️', desc: '将损益科目余额结转至本年利润科目',       url: 'final_processing2.html?step=profit', checkFn: () => (lsGet('QM_ClosingStatus') || {}).profitDone },
  { key: 'close',        label: '总账结账', icon: '🔒', desc: '完成最终结账，锁定本期账务数据',         url: 'final_processing2.html?step=close', checkFn: () => (lsGet('QM_ClosingStatus') || {}).closed },
];

// 步骤完成状态存储
function getStepDone(key) {
  const period = lsGet('QM_CurrentPeriod') || '2026-02';
  const doneMap = lsGet('QM_StepsDone') || {};
  return !!(doneMap[period] && doneMap[period][key]);
}

// ── 生成期间选项（从凭证数据动态生成 + 当前月份）──
function buildPeriodOptions() {
  const sel = document.getElementById('periodSelect');
  sel.innerHTML = '';

  const periodSet = collectPeriodsFromVouchers();
  periodSet.add(todayPeriod()); // 始终包含当前月份

  const periods = [...periodSet].sort();

  // 已保存的期间若不在列表里则改用当前月份
  let current = lsGet('QM_CurrentPeriod') || todayPeriod();
  if (!periods.includes(current)) {
    current = todayPeriod();
    lsSet('QM_CurrentPeriod', current);
  }

  periods.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = p;
    if (p === current) opt.selected = true;
    sel.appendChild(opt);
  });
}

// ── 期间切换 ──
function onPeriodChange(val) {
  lsSet('QM_CurrentPeriod', val);
  document.getElementById('periodBadge').textContent = val;
  renderAll();
  showToast(`已切换至 ${val} 期间`, 'success');
}

// ── 渲染功能卡片 ──
function renderCards() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';

  STEPS.forEach((step, idx) => {
    const isDone = step.checkFn();
    const card = document.createElement('div');
    card.className = `func-card${isDone ? ' done' : ''}`;

    // 状态标签
    let statusHtml;
    if (isDone) {
      statusHtml = `<span class="status-badge status-done">已完成</span>`;
    } else if (idx === 0) {
      statusHtml = `<span class="status-badge status-ready">就绪</span>`;
    } else {
      // 检查前置步骤
      const prevDone = idx === 0 ? true : STEPS[idx - 1].checkFn();
      statusHtml = prevDone
        ? `<span class="status-badge status-ready">就绪</span>`
        : `<span class="status-badge status-pending">待处理</span>`;
    }

    const btnClass = isDone ? 'btn-enter done-btn' : 'btn-enter';
    const btnText = isDone ? '查看' : '进入';

    card.innerHTML = `
      <span class="card-icon">${step.icon}</span>
      <div class="done-mark">✅</div>
      <div class="card-header">
        <div class="card-name">${step.label}</div>
        ${statusHtml}
      </div>
      <div class="card-desc">${step.desc}</div>
      <div class="card-footer">
        <span class="card-meta">步骤 ${idx + 1} / 6</span>
        <a href="${step.url}" class="${btnClass}">${btnText} →</a>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ── 渲染步骤进度条 ──
function renderStepsBar() {
  const bar = document.getElementById('stepsBar');
  bar.innerHTML = '';

  const stepLabels = ['自动转账', '凭证摊销', '凭证预提', '期末调汇', '结转损益', '总账结账'];

  // 找到第一个未完成的步骤（当前步骤）
  let currentIdx = STEPS.findIndex(s => !s.checkFn());
  if (currentIdx === -1) currentIdx = STEPS.length; // 全部完成

  STEPS.forEach((step, idx) => {
    const isDone = step.checkFn();
    const isCurrent = idx === currentIdx;

    const item = document.createElement('div');
    item.className = `step-item${isDone ? ' done' : ''}${isCurrent ? ' current' : ''}`;

    const circleClass = isDone ? 'step-circle done' : (isCurrent ? 'step-circle current' : 'step-circle');
    const circleContent = isDone ? '✓' : (idx + 1);
    const lineClass = `step-line${isDone ? ' done' : ''}`;
    const statusText = isDone ? '已完成' : (isCurrent ? '进行中' : '待处理');

    item.innerHTML = `
      <div class="step-line ${isDone ? 'done' : ''}"></div>
      <div class="${circleClass}">${circleContent}</div>
      <div class="step-label">${stepLabels[idx]}</div>
      <div class="step-status">${statusText}</div>
    `;
    bar.appendChild(item);
  });
}

// ── 更新统计摘要 ──
function updateSummary() {
  const vouchers = lsGet('QM_Vouchers') || [];
  document.getElementById('voucherCount').textContent = vouchers.length;

  const doneCount = STEPS.filter(s => s.checkFn()).length;
  document.getElementById('doneCount').textContent = `${doneCount} / 6`;

  const schemes = lsGet('QM_Schemes') || {};
  const autoEnabled = (schemes.auto || []).filter(s => s.status === '启用').length;
  document.getElementById('schemeCount').textContent = autoEnabled;

  const status = lsGet('QM_ClosingStatus') || {};
  document.getElementById('closedStatus').textContent = status.closed ? '已结账' : '未结账';
  document.getElementById('closedStatus').style.color = status.closed ? '#059669' : '#dc2626';
}

// ── 整体渲染 ──
function renderAll() {
  renderCards();
  renderStepsBar();
}

// ── Toast 提示 ──
function showToast(msg, type = '') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast${type ? ' ' + type : ''}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('removing');
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

// ── 初始化 ──
initDefaults();
buildPeriodOptions();

// 同步期间徽章
const currentPeriod = lsGet('QM_CurrentPeriod') || todayPeriod();
document.getElementById('periodBadge').textContent = currentPeriod;

renderAll();

// 监听 storage 变化（其他页面更新数据时同步刷新）
window.addEventListener('storage', (e) => {
  if (e.key && e.key.startsWith('QM_')) {
    renderAll();
  }
});
</script>
