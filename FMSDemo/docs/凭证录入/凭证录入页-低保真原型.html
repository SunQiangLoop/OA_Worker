<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>凭证录入页 - 低保真原型 V1.0.0</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; font-size:13px; background:#f0f2f5; padding:16px; color:#333; }
.container { max-width:1200px; margin:0 auto; background:#fff; border-radius:4px; box-shadow:0 2px 8px rgba(0,0,0,.1); }

/* ===== 页头 ===== */
.ve-header { display:flex; justify-content:space-between; align-items:center; padding:12px 20px; border-bottom:1px solid #e8e8e8; background:#fafafa; }
.ve-page-title { font-size:14px; font-weight:600; color:#1a1a1a; }
.ve-actions { display:flex; align-items:center; gap:8px; }

/* ===== 按钮 ===== */
.btn { padding:6px 14px; border:1px solid #d9d9d9; border-radius:3px; background:#fff; color:#333; font-size:13px; cursor:pointer; transition:border-color .2s; white-space:nowrap; }
.btn:hover { border-color:#999; }
.btn-primary { background:#1890ff; border-color:#1890ff; color:#fff; }
.btn-primary:hover { background:#40a9ff; border-color:#40a9ff; }

/* 分裂按钮 */
.split-group { display:inline-flex; border:1px solid #d9d9d9; border-radius:3px; overflow:visible; position:relative; }
.split-main { padding:6px 12px; border:none; background:#fff; color:#333; font-size:13px; cursor:pointer; border-right:1px solid #d9d9d9; }
.split-main:hover { background:#f5f5f5; }
.split-main.blue { background:#1890ff; color:#fff; border-right:1px solid rgba(255,255,255,.3); }
.split-main.blue:hover { background:#40a9ff; }
.split-arrow { padding:6px 8px; border:none; background:#fff; color:#666; font-size:11px; cursor:pointer; }
.split-arrow:hover { background:#f5f5f5; }
.split-arrow.blue { background:#1890ff; color:#fff; }
.split-arrow.blue:hover { background:#40a9ff; }
.split-dropdown { display:none; position:absolute; top:calc(100% + 2px); left:0; min-width:150px; background:#fff; border:1px solid #d9d9d9; border-radius:3px; box-shadow:0 4px 12px rgba(0,0,0,.12); z-index:100; }
.split-dropdown.open { display:block; }
.split-item { display:block; padding:8px 14px; font-size:13px; color:#333; cursor:pointer; white-space:nowrap; }
.split-item:hover { background:#f5f5f5; }
.split-item.active-item { background:#e6f7ff; color:#1890ff; }

/* ===== 凭证内容区 ===== */
.ve-body { padding:20px; }
.ve-center-title { text-align:center; font-size:16px; font-weight:600; padding-bottom:14px; border-bottom:1px solid #e8e8e8; margin-bottom:16px; }
.ve-form-row { display:flex; flex-wrap:wrap; gap:16px 24px; padding-bottom:16px; border-bottom:1px solid #e8e8e8; margin-bottom:16px; align-items:center; }
.field { display:flex; align-items:center; gap:8px; }
.field label { font-size:13px; color:#555; white-space:nowrap; }
.required { color:#ff4d4f; margin-right:2px; }
.field input, .field select { padding:5px 10px; border:1px solid #d9d9d9; border-radius:3px; font-size:13px; }
.field input:focus, .field select:focus { outline:none; border-color:#40a9ff; }
.inp-date { width:140px; }
.inp-word { width:80px; }
.inp-no { width:72px; font-family:monospace; letter-spacing:1px; }
.inp-attach { width:60px; }

/* ===== 分录明细 ===== */
.section-title { font-size:14px; font-weight:600; margin-bottom:10px; }
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #e0e0e0; padding:7px 8px; font-size:12px; vertical-align:middle; }
th { background:#fafafa; font-weight:600; color:#555; white-space:nowrap; }
.col-seq { width:36px; text-align:center; }
.col-summary { min-width:180px; }
.col-subject { min-width:200px; }
.col-aux { width:150px; }
.col-amt { width:110px; text-align:right; }
.seq-cell { display:flex; align-items:center; justify-content:center; cursor:pointer; user-select:none; position:relative; }
.seq-num { color:#aaa; font-size:12px; }
.seq-cell:hover .seq-num { display:none; }
.seq-gear { display:none; font-size:14px; color:#666; }
.seq-cell:hover .seq-gear { display:block; }
.entry-input { width:100%; border:none; background:transparent; font-size:12px; padding:2px 4px; color:#333; }
.entry-input:focus { outline:1px solid #40a9ff; border-radius:2px; }
.aux-btn { width:100%; text-align:left; border:none; background:transparent; font-size:12px; padding:2px 4px; color:#aaa; cursor:pointer; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.aux-btn:hover { background:#f0f5ff; border-radius:2px; }
.aux-btn.has-val { color:#1890ff; }
.amt-input { width:100%; border:none; background:transparent; font-size:12px; padding:2px 4px; color:#333; text-align:right; }
.amt-input:focus { outline:1px solid #40a9ff; border-radius:2px; }
.total-row td { background:#fafafa; font-weight:600; }
.total-label { text-align:right; color:#555; font-weight:600; }

/* ===== 弹窗公共 ===== */
.overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.45); z-index:999; align-items:center; justify-content:center; }
.overlay.open { display:flex; }
.modal { background:#fff; border-radius:4px; box-shadow:0 8px 32px rgba(0,0,0,.18); display:flex; flex-direction:column; max-height:80vh; }
.modal-sm { width:380px; max-width:92vw; }
.modal-md { width:520px; max-width:92vw; }
.modal-lg { width:840px; max-width:96vw; }
.modal-hdr { display:flex; justify-content:space-between; align-items:center; padding:14px 20px; border-bottom:1px solid #e8e8e8; }
.modal-title { font-size:14px; font-weight:600; }
.modal-close { background:none; border:none; font-size:18px; cursor:pointer; color:#999; padding:0 4px; }
.modal-close:hover { color:#333; }
.modal-body { padding:16px 20px; overflow-y:auto; flex:1; }
.modal-footer { display:flex; justify-content:flex-end; gap:8px; padding:12px 20px; border-top:1px solid #e8e8e8; }

/* 常用凭证弹窗 */
.filter-bar { display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
.filter-bar select, .filter-bar input { padding:5px 8px; border:1px solid #d9d9d9; border-radius:3px; font-size:12px; }
.common-table { width:100%; border-collapse:collapse; font-size:12px; }
.common-table th, .common-table td { border:1px solid #e0e0e0; padding:6px 8px; }
.common-table th { background:#fafafa; font-weight:600; }
.common-table tbody tr { cursor:pointer; }
.common-table tbody tr:hover { background:#f0f5ff; }
.common-table tbody tr.selected { background:#bae7ff; }
.common-info { font-size:12px; color:#888; margin-top:8px; }

/* 保存为常用弹窗 */
.form-row { display:flex; align-items:center; margin-bottom:14px; gap:8px; }
.form-row label { width:80px; text-align:right; font-size:13px; color:#555; flex-shrink:0; }
.form-row input, .form-row select { flex:1; padding:6px 10px; border:1px solid #d9d9d9; border-radius:3px; font-size:13px; }
.readonly-field { flex:1; padding:6px 10px; background:#fafafa; color:#888; border:1px solid #e8e8e8; border-radius:3px; font-size:13px; }

/* 行菜单浮层 */
.row-menu { display:none; position:fixed; z-index:9999; background:#fff; border:1px solid #d9d9d9; border-radius:4px; box-shadow:0 4px 16px rgba(0,0,0,.15); min-width:88px; padding:4px 0; }
.row-menu-item { display:block; width:100%; padding:7px 16px; border:none; background:none; text-align:left; cursor:pointer; font-size:13px; color:#333; white-space:nowrap; }
.row-menu-item:hover { background:#f0f5ff; color:#1890ff; }
.row-menu-item.danger { color:#ff4d4f; }
.row-menu-item.danger:hover { background:#fff1f0; }
.row-menu-sep { height:1px; background:#f0f0f0; margin:3px 0; }

/* 辅助核算浮层 */
.aux-popup { display:none; position:fixed; z-index:9999; background:#fff; border:1px solid #d9d9d9; border-radius:4px; box-shadow:0 6px 20px rgba(0,0,0,.15); min-width:220px; max-height:320px; overflow-y:auto; }
.aux-popup-hdr { display:flex; justify-content:space-between; align-items:center; padding:8px 12px 6px; border-bottom:1px solid #f0f0f0; }
.aux-group-label { font-size:11px; color:#aaa; font-weight:600; letter-spacing:.5px; padding:5px 12px 2px; text-transform:uppercase; }
.aux-option { display:flex; align-items:center; gap:8px; padding:6px 12px; cursor:pointer; font-size:13px; }
.aux-option:hover { background:#f0f5ff; }

/* Toast */
.toast-wrap { position:fixed; top:24px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
.toast { background:#333; color:#fff; padding:10px 20px; border-radius:4px; font-size:13px; box-shadow:0 4px 12px rgba(0,0,0,.2); animation:toastIn .25s ease; white-space:nowrap; }
.toast.success { background:#52c41a; }
.toast.error { background:#ff4d4f; }
.toast.warning { background:#faad14; }
@keyframes toastIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }

/* 科目下拉 */
.subj-ac { display:none; position:fixed; z-index:9999; background:#fff; border:1px solid #d9d9d9; border-radius:3px; box-shadow:0 4px 16px rgba(0,0,0,.18); min-width:240px; max-height:260px; overflow-y:auto; }
.ac-item { padding:7px 12px; font-size:13px; cursor:pointer; }
.ac-item:hover { background:#e6f7ff; color:#1890ff; }
.ac-code { color:#aaa; margin-right:6px; font-size:11px; font-family:monospace; }
/* 摘要下拉 */
.sum-ac { display:none; position:fixed; z-index:9999; background:#fff; border:1px solid #d9d9d9; border-radius:3px; box-shadow:0 4px 16px rgba(0,0,0,.18); min-width:200px; max-height:220px; overflow-y:auto; }
</style>
</head>
<body>
<div class="container">
  <!-- ===== 页头 ===== -->
  <div class="ve-header">
    <span class="ve-page-title">&#9679; 新增凭证</span>
    <div class="ve-actions">
      <button class="btn" onclick="confirmClear()">清空</button>

      <!-- 新增▼ -->
      <div class="split-group">
        <button class="split-main" onclick="doNewVoucher()">新增</button>
        <button class="split-arrow" onclick="toggleDropdown('addMenu',event)">&#9662;</button>
        <div class="split-dropdown" id="addMenu">
          <span class="split-item active-item" onclick="doNewVoucher();closeDropdown('addMenu')">新增</span>
          <span class="split-item" onclick="openModal('commonModal');closeDropdown('addMenu')">引入常用凭证</span>
          <span class="split-item" onclick="openModal('draftModal');closeDropdown('addMenu')">引入草稿凭证</span>
        </div>
      </div>

      <!-- 保存▼ -->
      <div class="split-group">
        <button class="split-main blue" onclick="doSave()">保存</button>
        <button class="split-arrow blue" onclick="toggleDropdown('saveMenu',event)">&#9662;</button>
        <div class="split-dropdown" id="saveMenu">
          <span class="split-item" onclick="doSave();closeDropdown('saveMenu')">保存</span>
          <span class="split-item" onclick="doSaveNew();closeDropdown('saveMenu')">保存新增</span>
          <span class="split-item" onclick="showToast('已保存为草稿，可从「引入草稿凭证」找回','success');closeDropdown('saveMenu')">保存为草稿</span>
          <span class="split-item" onclick="openModal('saveTemplateModal');closeDropdown('saveMenu')">保存为常用凭证</span>
        </div>
      </div>

      <button class="btn btn-primary" onclick="doSubmit()">提交</button>
    </div>
  </div>

  <!-- ===== 凭证主体 ===== -->
  <div class="ve-body">
    <div class="ve-center-title" id="centerTitle">转账凭证</div>

    <!-- 头部字段 -->
    <div class="ve-form-row">
      <div class="field">
        <label><span class="required">*</span>日期</label>
        <input type="date" class="inp-date" id="veDateInput" value="2026-04-04">
      </div>
      <div class="field">
        <label><span class="required">*</span>凭证字</label>
        <select class="inp-word" id="veVoucherWord" onchange="syncVoucherWord()">
          <option value="收">收</option>
          <option value="付">付</option>
          <option value="转" selected>转</option>
        </select>
      </div>
      <div class="field">
        <label>凭证号</label>
        <input type="text" class="inp-no" id="veVoucherNo" value="3527" maxlength="4" placeholder="0001" oninput="this.value=this.value.replace(/\D/g,'').slice(0,4)">
      </div>
      <div class="field">
        <label>附件数</label>
        <input type="number" class="inp-attach" id="veAttachCount" value="0" min="0">
      </div>
    </div>

    <!-- 分录明细 -->
    <div class="section-title">分录明细</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="col-seq">序号</th>
            <th class="col-summary">摘要</th>
            <th class="col-subject">科目名称</th>
            <th class="col-aux">辅助核算项目</th>
            <th class="col-amt">借方金额</th>
            <th class="col-amt">贷方金额</th>
          </tr>
        </thead>
        <tbody id="veEntryBody"></tbody>
        <tfoot>
          <tr class="total-row">
            <td colspan="4" class="total-label">合计</td>
            <td class="col-amt" id="veTotalDebit">0.00</td>
            <td class="col-amt" id="veTotalCredit">0.00</td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>
</div>

<!-- ===== 弹窗1：常用凭证参照 ===== -->
<div class="overlay" id="commonModal" onclick="onOverlayClick(event,'commonModal')">
  <div class="modal modal-lg">
    <div class="modal-hdr">
      <span class="modal-title">常用凭证参照</span>
      <button class="modal-close" onclick="closeModal('commonModal')">&#215;</button>
    </div>
    <div class="modal-body">
      <div class="filter-bar">
        <select><option>名称编码规格型号</option><option>编码</option><option>说明</option></select>
        <input type="text" id="commonKeyword" placeholder="请输入关键字" style="width:180px;">
        <button class="btn" style="font-size:12px;padding:4px 10px;" onclick="filterCommon()">过滤</button>
        <label style="font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer;"><input type="checkbox"> 结果中过滤</label>
        <button class="btn" style="font-size:12px;padding:4px 10px;" onclick="showToast('栏目设置功能待实现')">栏目</button>
      </div>
      <table class="common-table">
        <thead>
          <tr>
            <th style="width:44px;">序号</th>
            <th style="width:60px;">编码</th>
            <th>说明</th>
            <th style="width:90px;">凭证类别</th>
            <th style="width:72px;">附单据数</th>
            <th style="width:72px;">所属分类</th>
          </tr>
        </thead>
        <tbody id="commonBody"></tbody>
      </table>
      <div class="common-info" id="commonInfo">共0条记录</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="doImportCommon()">确定</button>
      <button class="btn" onclick="closeModal('commonModal')">取消</button>
    </div>
  </div>
</div>

<!-- ===== 弹窗2：草稿 ===== -->
<div class="overlay" id="draftModal" onclick="onOverlayClick(event,'draftModal')">
  <div class="modal modal-md">
    <div class="modal-hdr">
      <span class="modal-title">草稿</span>
      <button class="modal-close" onclick="closeModal('draftModal')">&#215;</button>
    </div>
    <div class="modal-body">
      <table class="common-table">
        <thead>
          <tr>
            <th style="width:40px;">序号</th>
            <th style="width:36px;"><input type="checkbox"></th>
            <th>单据编号</th>
            <th style="width:90px;">凭证类别</th>
            <th style="width:100px;">制单日期</th>
            <th style="width:72px;">附单据数</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="6" style="text-align:center;color:#bbb;padding:30px;font-size:12px;">暂无草稿凭证</td></tr>
        </tbody>
      </table>
    </div>
    <div class="modal-footer">
      <button class="btn" style="color:#ff4d4f;" disabled>删除</button>
      <button class="btn btn-primary" onclick="showToast('草稿列表为空，无可引入内容','warning');closeModal('draftModal')">确定</button>
      <button class="btn" onclick="closeModal('draftModal')">取消</button>
    </div>
  </div>
</div>

<!-- ===== 弹窗3：保存为常用凭证 ===== -->
<div class="overlay" id="saveTemplateModal" onclick="onOverlayClick(event,'saveTemplateModal')">
  <div class="modal modal-sm">
    <div class="modal-hdr">
      <span class="modal-title">保存为常用凭证</span>
      <button class="modal-close" onclick="closeModal('saveTemplateModal')">&#215;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label><span style="color:#ff4d4f">*</span> 编码</label>
        <input type="text" id="tmplCode" placeholder="请输入4位数字编码" maxlength="10">
      </div>
      <div class="form-row">
        <label><span style="color:#ff4d4f">*</span> 说明</label>
        <input type="text" id="tmplDesc" placeholder="不超过50字符" maxlength="50">
      </div>
      <div class="form-row">
        <label><span style="color:#ff4d4f">*</span> 所属分类</label>
        <select id="tmplCategory">
          <option value="">请选择</option>
          <option>销售</option><option>采购</option><option>费用</option><option>薪资</option><option>其他</option>
        </select>
      </div>
      <div class="form-row">
        <label>凭证类别</label>
        <div class="readonly-field" id="tmplVoucherType">转账凭证</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('saveTemplateModal')">取消</button>
      <button class="btn btn-primary" onclick="doSaveTemplate()">确定</button>
    </div>
  </div>
</div>

<!-- ===== 弹窗4：通用确认弹窗 ===== -->
<div class="overlay" id="confirmModal" onclick="onOverlayClick(event,'confirmModal')">
  <div class="modal modal-sm">
    <div class="modal-hdr">
      <span class="modal-title" id="confirmTitle">确认</span>
      <button class="modal-close" onclick="closeModal('confirmModal')">&#215;</button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:#333;padding:8px 0;" id="confirmMsg"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="confirmOkBtn">确定</button>
      <button class="btn" onclick="closeModal('confirmModal')">取消</button>
    </div>
  </div>
</div>

<!-- 行右键菜单 -->
<div class="row-menu" id="rowMenu">
  <button class="row-menu-item" onclick="rowOp('addBelow')">增行</button>
  <button class="row-menu-item" onclick="rowOp('insertBelow')">插行</button>
  <button class="row-menu-item" onclick="rowOp('copy')">复制行</button>
  <div class="row-menu-sep"></div>
  <button class="row-menu-item danger" onclick="rowOp('delete')">删行</button>
</div>

<!-- 辅助核算浮层 -->
<div class="aux-popup" id="auxPopup">
  <div class="aux-popup-hdr">
    <span style="font-size:12px;color:#888;font-weight:600;">辅助核算</span>
    <span style="font-size:12px;color:#1890ff;cursor:pointer;" onclick="clearAux()">清除全部</span>
  </div>
  <div class="aux-group-label">往来单位</div>
  <label class="aux-option"><input type="checkbox" value="c001"> <span style="color:#aaa;font-size:11px;font-family:monospace;">C001</span> 南京浦鹏物流有限公司</label>
  <label class="aux-option"><input type="checkbox" value="c002"> <span style="color:#aaa;font-size:11px;font-family:monospace;">C002</span> 上海瀚丰物流有限公司</label>
  <label class="aux-option"><input type="checkbox" value="c003"> <span style="color:#aaa;font-size:11px;font-family:monospace;">C003</span> 北京鑫达货运有限公司</label>
  <div class="aux-group-label">现金流量项目</div>
  <label class="aux-option"><input type="checkbox" value="cf01"> <span style="color:#aaa;font-size:11px;font-family:monospace;">CF01</span> 销售商品收到现金</label>
  <label class="aux-option"><input type="checkbox" value="cf02"> <span style="color:#aaa;font-size:11px;font-family:monospace;">CF02</span> 购买商品支付现金</label>
</div>

<!-- 科目下拉 -->
<div class="subj-ac" id="subjAC"></div>
<!-- 摘要下拉 -->
<div class="sum-ac" id="sumAC"></div>

<!-- Toast容器 -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
// ===== 数据 =====
var SUBJECTS = [
  {code:'1001',name:'库存现金'},{code:'1002',name:'银行存款'},{code:'100201',name:'银行存款-中国银行'},
  {code:'100202',name:'银行存款-南京银行'},{code:'1012',name:'其他货币资金'},{code:'1101',name:'交易性金融资产'},
  {code:'1122',name:'应收账款'},{code:'1123',name:'预付账款'},{code:'2202',name:'应付账款'},
  {code:'2203',name:'预收账款'},{code:'2211',name:'应付职工薪酬'},{code:'2221',name:'应交税费'},
  {code:'5001',name:'主营业务收入'},{code:'6401',name:'主营业务成本'},{code:'6601',name:'销售费用'},
  {code:'6602',name:'管理费用'},{code:'6711',name:'营业外收入'},{code:'6801',name:'营业外支出'}
];
var SUMMARIES = [
  '确认应收债权','确认运输收入','确认销项税额','支付运费','收到货款',
  '计提工资','银行转账','日常费用报销','预付货款','冲销应收账款'
];
var COMMON_VOUCHERS = [
  {seq:1,code:'1001',name:'现金销售',type:'转账凭证',attach:'-',category:'销售'},
  {seq:2,code:'1002',name:'预售商品',type:'转账凭证',attach:'-',category:'销售'},
  {seq:3,code:'1003',name:'销售商品（已预付部分款）',type:'转账凭证',attach:'-',category:'销售'},
  {seq:4,code:'1004',name:'赊账销售商品',type:'转账凭证',attach:'-',category:'销售'},
  {seq:5,code:'1005',name:'销售收回货款',type:'转账凭证',attach:'-',category:'销售'},
  {seq:6,code:'2001',name:'现金进货',type:'转账凭证',attach:'-',category:'采购'},
  {seq:7,code:'2002',name:'预付货款',type:'转账凭证',attach:'-',category:'采购'},
  {seq:8,code:'2003',name:'预付退回',type:'转账凭证',attach:'-',category:'采购'},
  {seq:9,code:'3001',name:'计提工资',type:'转账凭证',attach:'-',category:'费用'},
  {seq:10,code:'3002',name:'发放工资',type:'转账凭证',attach:'-',category:'费用'},
  {seq:11,code:'4001',name:'日常费用报销',type:'转账凭证',attach:'-',category:'费用'},
  {seq:12,code:'4002',name:'计提折旧',type:'转账凭证',attach:'-',category:'费用'},
  {seq:13,code:'5001',name:'计提工资税款',type:'转账凭证',attach:'-',category:'薪资'},
  {seq:14,code:'5002',name:'代扣个人所得税',type:'转账凭证',attach:'-',category:'薪资'}
];
var filteredCommon = COMMON_VOUCHERS.slice();
var selectedCommonIdx = -1;

// ===== 行数据 =====
var rows = [];
var nextRowId = 1;
for (var i=0;i<10;i++) rows.push({id:nextRowId++,summary:'',subject:'',auxVals:[],debit:0,credit:0});

// ===== 渲染分录表 =====
function renderTable() {
  var tbody = document.getElementById('veEntryBody');
  tbody.innerHTML = rows.map(function(row,idx) {
    var auxText = row.auxVals && row.auxVals.length ? (row.auxVals.length===1?row.auxVals[0]:'已选'+row.auxVals.length+'项') : '请选择...';
    var hasAux = row.auxVals && row.auxVals.length > 0;
    return '<tr id="row_'+row.id+'">'+
      '<td class="col-seq"><div class="seq-cell" onclick="showRowMenu(event,'+idx+')"><span class="seq-num">'+(idx+1)+'</span><span class="seq-gear">⚙</span></div></td>'+
      '<td class="col-summary"><input class="entry-input" type="text" value="'+escHtml(row.summary)+'" placeholder="输入摘要" oninput="rows['+idx+'].summary=this.value;" onfocus="showSumAC('+idx+',this)" onblur="setTimeout(function(){hideSumAC()},200)"></td>'+
      '<td class="col-subject"><input class="entry-input" type="text" value="'+escHtml(row.subject)+'" placeholder="输入科目名称/编码" oninput="rows['+idx+'].subject=this.value;showSubjAC('+idx+',this)" onfocus="showSubjAC('+idx+',this)" onblur="setTimeout(function(){hideSubjAC()},200)"></td>'+
      '<td class="col-aux"><button class="aux-btn'+(hasAux?' has-val':'')+'" onclick="showAuxPopup('+idx+',this)">'+escHtml(auxText)+'</button></td>'+
      '<td class="col-amt"><input class="amt-input" type="number" step="0.01" value="'+(row.debit||'')+'" placeholder="0" oninput="rows['+idx+'].debit=parseFloat(this.value)||0;updateTotals()"></td>'+
      '<td class="col-amt"><input class="amt-input" type="number" step="0.01" value="'+(row.credit||'')+'" placeholder="0" oninput="rows['+idx+'].credit=parseFloat(this.value)||0;updateTotals()"></td>'+
    '</tr>';
  }).join('');
  updateTotals();
}

function escHtml(v) {
  return (v||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateTotals() {
  var d=0,c=0;
  rows.forEach(function(r){d+=r.debit;c+=r.credit;});
  document.getElementById('veTotalDebit').textContent=d.toFixed(2);
  document.getElementById('veTotalCredit').textContent=c.toFixed(2);
}

// ===== 凭证字同步 =====
var TYPE_MAP = {收:'收款凭证',付:'付款凭证',转:'转账凭证',记:'转账凭证'};
function syncVoucherWord() {
  var word = document.getElementById('veVoucherWord').value;
  document.getElementById('centerTitle').textContent = TYPE_MAP[word]||'转账凭证';
  // 同步保存为常用弹窗中的凭证类别
  var el = document.getElementById('tmplVoucherType');
  if(el) el.textContent = TYPE_MAP[word]||'转账凭证';
}

// ===== 科目自动补全 =====
var activeSubjIdx = -1;
function showSubjAC(idx, input) {
  activeSubjIdx = idx;
  var q = (input.value||'').trim().toLowerCase();
  var ac = document.getElementById('subjAC');
  var matches = q ? SUBJECTS.filter(function(s){
    return s.code.indexOf(q)===0 || s.name.toLowerCase().indexOf(q)===0;
  }).slice(0,40) : SUBJECTS.slice(0,40);
  if(!matches.length){ ac.style.display='none'; return; }
  ac.innerHTML = matches.map(function(s){
    return '<div class="ac-item" onmousedown="selectSubject(\''+s.code+' '+s.name+'\')"><span class="ac-code">'+s.code+'</span>'+s.name+'</div>';
  }).join('');
  positionAC(ac, input);
}
function selectSubject(val) {
  if(activeSubjIdx<0) return;
  rows[activeSubjIdx].subject = val;
  rows[activeSubjIdx].auxVals = [];
  renderTable();
  hideSubjAC();
}
function hideSubjAC(){ document.getElementById('subjAC').style.display='none'; }

// ===== 摘要自动补全 =====
var activeSumIdx = -1;
function showSumAC(idx, input) {
  activeSumIdx = idx;
  var q = (input.value||'').trim().toLowerCase();
  var ac = document.getElementById('sumAC');
  var matches = q ? SUMMARIES.filter(function(s){return s.toLowerCase().indexOf(q)===0;}) : SUMMARIES;
  if(!matches.length){ ac.style.display='none'; return; }
  ac.innerHTML = matches.map(function(s){
    return '<div class="ac-item" onmousedown="selectSummary(\''+s+'\')">'+s+'</div>';
  }).join('');
  positionAC(ac, input);
}
function selectSummary(val) {
  if(activeSumIdx<0) return;
  rows[activeSumIdx].summary = val;
  renderTable();
  hideSumAC();
}
function hideSumAC(){ document.getElementById('sumAC').style.display='none'; }

function positionAC(el, input) {
  var rect = input.getBoundingClientRect();
  el.style.left = rect.left+'px';
  el.style.top  = (rect.bottom+2)+'px';
  el.style.width = Math.max(rect.width,200)+'px';
  el.style.display = 'block';
}

// ===== 辅助核算浮层 =====
var activeAuxIdx = -1;
function showAuxPopup(idx, btn) {
  var popup = document.getElementById('auxPopup');
  if(popup.style.display!=='none' && activeAuxIdx===idx){popup.style.display='none';activeAuxIdx=-1;return;}
  activeAuxIdx = idx;
  var rect = btn.getBoundingClientRect();
  popup.style.left = rect.left+'px';
  popup.style.top  = (rect.bottom+2)+'px';
  popup.style.minWidth = Math.max(rect.width,220)+'px';
  popup.style.display = 'block';
  // 同步勾选状态
  var curVals = rows[idx].auxVals||[];
  popup.querySelectorAll('input[type=checkbox]').forEach(function(cb){
    cb.checked = curVals.indexOf(cb.value)>=0;
    cb.onchange = function(){
      var v = cb.value;
      var pos = rows[activeAuxIdx].auxVals.indexOf(v);
      if(cb.checked && pos===-1) rows[activeAuxIdx].auxVals.push(v);
      else if(!cb.checked && pos!==-1) rows[activeAuxIdx].auxVals.splice(pos,1);
      renderTable();
    };
  });
}
function clearAux() {
  if(activeAuxIdx<0) return;
  rows[activeAuxIdx].auxVals=[];
  document.getElementById('auxPopup').style.display='none';
  renderTable();
}

// ===== 行右键菜单 =====
var activeRowMenuIdx = -1;
function showRowMenu(e, idx) {
  e.stopPropagation();
  activeRowMenuIdx = idx;
  var menu = document.getElementById('rowMenu');
  if(menu.style.display!=='none' && activeRowMenuIdx===idx){menu.style.display='none';return;}
  var rect = e.currentTarget.getBoundingClientRect();
  menu.style.left = (rect.right+4)+'px';
  menu.style.top  = rect.top+'px';
  menu.style.display = 'block';
}
function rowOp(op) {
  var idx = activeRowMenuIdx;
  document.getElementById('rowMenu').style.display='none';
  if(idx<0) return;
  if(op==='addBelow') {
    rows.push({id:nextRowId++,summary:'',subject:'',auxVals:[],debit:0,credit:0});
    showToast('已在末尾新增一行','success');
  } else if(op==='insertBelow') {
    rows.splice(idx+1,0,{id:nextRowId++,summary:'',subject:'',auxVals:[],debit:0,credit:0});
    showToast('已在第'+(idx+1)+'行下方插入一行','success');
  } else if(op==='copy') {
    var src = rows[idx];
    // 找下方第一个空行
    var found = -1;
    for(var i=idx+1;i<rows.length;i++){
      if(!rows[i].summary&&!rows[i].subject&&rows[i].debit===0&&rows[i].credit===0){found=i;break;}
    }
    if(found>=0) {
      rows[found] = {id:rows[found].id,summary:src.summary,subject:src.subject,auxVals:(src.auxVals||[]).slice(),debit:src.debit,credit:src.credit};
      showToast('已复制到第'+(found+1)+'行','success');
    } else {
      rows.splice(idx+1,0,{id:nextRowId++,summary:src.summary,subject:src.subject,auxVals:(src.auxVals||[]).slice(),debit:src.debit,credit:src.credit});
      showToast('下方无空行，已在当前行后新增','success');
    }
  } else if(op==='delete') {
    rows.splice(idx,1);
    if(rows.length===0) rows.push({id:nextRowId++,summary:'',subject:'',auxVals:[],debit:0,credit:0});
    showToast('已删除该行','success');
  }
  activeRowMenuIdx = -1;
  renderTable();
}

// ===== 工具栏操作 =====
function showConfirm(title, msg, cb) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmOkBtn').onclick = function(){ closeModal('confirmModal'); cb(); };
  openModal('confirmModal');
}
function confirmClear() {
  showConfirm('清空确认','确定要清空当前凭证内容吗？',function(){
    resetForm(); showToast('已清空','success');
  });
}
function doNewVoucher() {
  showConfirm('新增凭证','将清空当前表单内容，进入新建凭证状态，是否继续？',function(){
    resetForm(); showToast('已新建凭证','success');
  });
}
function resetForm() {
  rows = [{id:nextRowId++,summary:'',subject:'',auxVals:[],debit:0,credit:0},
          {id:nextRowId++,summary:'',subject:'',auxVals:[],debit:0,credit:0}];
  document.getElementById('veVoucherNo').value = '';
  renderTable();
}
function doSave() {
  var id = buildVoucherId();
  showToast('凭证 '+id+' 已保存，状态：待审核','success');
}
function doSaveNew() {
  doSave();
  setTimeout(function(){resetForm();showToast('已进入下一张新凭证','success');},600);
}
function doSubmit() {
  var debit=0,credit=0;
  rows.forEach(function(r){debit+=r.debit;credit+=r.credit;});
  var validRows = rows.filter(function(r){return r.subject.trim()!=='';});
  if(validRows.length<2){showToast('至少需要2行有效分录','error');return;}
  if(Math.abs(debit-credit)>0.001){showToast('借贷不平衡，请检查分录金额','error');return;}
  var id = buildVoucherId();
  showToast('凭证 '+id+' 已提交，进入审核流程','success');
}
function buildVoucherId() {
  var word = document.getElementById('veVoucherWord').value;
  var no = document.getElementById('veVoucherNo').value || '3527';
  while(no.length<4) no='0'+no;
  return word+'-'+no;
}

// ===== 常用凭证参照 =====
function filterCommon() {
  var kw = (document.getElementById('commonKeyword').value||'').trim().toLowerCase();
  filteredCommon = kw ? COMMON_VOUCHERS.filter(function(v){
    return v.code.toLowerCase().indexOf(kw)>=0||v.name.toLowerCase().indexOf(kw)>=0||v.category.toLowerCase().indexOf(kw)>=0;
  }) : COMMON_VOUCHERS.slice();
  selectedCommonIdx=-1;
  renderCommonTable();
}
function renderCommonTable() {
  var tbody = document.getElementById('commonBody');
  var info  = document.getElementById('commonInfo');
  tbody.innerHTML = filteredCommon.map(function(v,idx){
    return '<tr class="'+(idx===selectedCommonIdx?'selected':'')+'" onclick="selectedCommonIdx='+idx+';renderCommonTable()" ondblclick="selectedCommonIdx='+idx+';doImportCommon()">'+
      '<td style="text-align:center;">'+v.seq+'</td><td>'+v.code+'</td><td>'+v.name+'</td><td>'+v.type+'</td><td style="text-align:center;">'+v.attach+'</td><td>'+v.category+'</td></tr>';
  }).join('');
  if(info) info.textContent='共'+filteredCommon.length+'条记录';
}
function doImportCommon() {
  if(selectedCommonIdx<0){showToast('请先选择一条常用凭证','warning');return;}
  var v = filteredCommon[selectedCommonIdx];
  var hasContent = rows.some(function(r){return r.subject.trim()!==''||r.debit!==0||r.credit!==0;});
  function doImport() {
    rows = [
      {id:nextRowId++,summary:v.name,subject:'（请选择科目）',auxVals:[],debit:0,credit:0},
      {id:nextRowId++,summary:v.name,subject:'（请选择科目）',auxVals:[],debit:0,credit:0}
    ];
    renderTable();
    showToast('已引入「'+v.name+'」的分录模板，请填写金额','success');
    closeModal('commonModal');
  }
  if(hasContent) {
    showConfirm('引入确认','引入「'+v.name+'」将覆盖当前分录内容，是否继续？',doImport);
  } else { doImport(); }
}

// ===== 保存为常用凭证 =====
function doSaveTemplate() {
  var code = (document.getElementById('tmplCode').value||'').trim();
  var desc = (document.getElementById('tmplDesc').value||'').trim();
  var cat  = document.getElementById('tmplCategory').value;
  if(!code||!desc||!cat){showToast('请填写所有必填项','warning');return;}
  showToast('已保存为常用凭证「'+desc+'」','success');
  closeModal('saveTemplateModal');
}

// ===== 弹窗操作 =====
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function onOverlayClick(e,id){ if(e.target===document.getElementById(id)) closeModal(id); }

// ===== 分裂按钮下拉 =====
function toggleDropdown(id,e) {
  e.stopPropagation();
  var el=document.getElementById(id);
  var isOpen=el.classList.contains('open');
  document.querySelectorAll('.split-dropdown').forEach(function(d){d.classList.remove('open');});
  if(!isOpen) el.classList.add('open');
}
function closeDropdown(id){ document.getElementById(id).classList.remove('open'); }

// 全局关闭浮层
document.addEventListener('click',function(e){
  document.querySelectorAll('.split-dropdown').forEach(function(d){d.classList.remove('open');});
  if(!e.target.closest('.aux-popup')&&!e.target.classList.contains('aux-btn')&&!e.target.closest('.aux-btn'))
    document.getElementById('auxPopup').style.display='none';
  if(!e.target.closest('.row-menu')&&!e.target.closest('.seq-cell'))
    document.getElementById('rowMenu').style.display='none';
});

// ===== Toast =====
function showToast(msg,type) {
  var wrap=document.getElementById('toastWrap');
  var el=document.createElement('div');
  el.className='toast '+(type||'');
  el.textContent=msg;
  wrap.appendChild(el);
  setTimeout(function(){el.remove();},3000);
}

// ===== 初始化 =====
renderTable();
renderCommonTable();
</script>
</body>
</html>
